<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda e Resultados - CF Os Armacenenses</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="details-header">
        <a href="index.html" class="back-button" aria-label="Voltar à lista de competições">
            <img src="img/seta.png" alt="Voltar">
        </a>
        <div class="competition-title">
            <img src="img/logo.png" alt="Logo CF Os Armacenenses" class="competition-logo">
            <h1>Agenda <small>Próximos jogos e resultados globais</small></h1>
        </div>
    </header>

    <main class="container agenda-page">
        <nav class="tabs" role="tablist" aria-label="Agenda e resultados">
            <a href="#proximos" class="tab-link active" id="tab-proximos" role="tab" aria-controls="content-proximos" aria-selected="true" tabindex="0">Próximos Jogos</a>
            <a href="#resultados" class="tab-link" id="tab-agenda-resultados" role="tab" aria-controls="content-resultados-globais" aria-selected="false" tabindex="-1">Resultados</a>
        </nav>

        <section class="agenda-toolbar" aria-label="Filtros">
            <div class="agenda-toolbar__group">
                <div class="agenda-filter agenda-filter--range">
                    <span>Período</span>
                    <button type="button" id="filter-date-range-trigger" class="agenda-range-trigger" aria-haspopup="dialog" aria-expanded="false">
                        Selecionar período
                    </button>
                    <div id="date-range-picker" class="agenda-range-picker hidden" role="dialog" aria-modal="false" aria-label="Selecionar período">
                        <div class="agenda-range-picker__header">
                            <div>
                                <strong>Selecionar período</strong>
                                <p id="date-range-picker-summary">Escolhe a data inicial e final.</p>
                            </div>
                            <button type="button" id="date-range-picker-close" class="agenda-range-picker__close" aria-label="Fechar calendário">×</button>
                        </div>
                        <div class="agenda-range-picker__nav">
                            <button type="button" id="date-range-prev" class="agenda-range-nav" aria-label="Mês anterior">‹</button>
                            <select id="date-range-month-select" class="agenda-range-select" aria-label="Selecionar mês"></select>
                            <select id="date-range-year-select" class="agenda-range-select agenda-range-select--year" aria-label="Selecionar ano"></select>
                            <button type="button" id="date-range-next" class="agenda-range-nav" aria-label="Mês seguinte">›</button>
                        </div>
                        <div class="agenda-range-inputs">
                            <label class="agenda-filter">
                                <span>Início</span>
                                <input type="date" id="date-range-start-input">
                            </label>
                            <label class="agenda-filter">
                                <span>Fim</span>
                                <input type="date" id="date-range-end-input">
                            </label>
                        </div>
                        <div id="date-range-calendars" class="agenda-range-picker__calendars"></div>
                        <div class="agenda-range-picker__actions">
                            <button type="button" id="date-range-clear" class="agenda-range-action agenda-range-action--secondary">Limpar</button>
                            <button type="button" id="date-range-cancel" class="agenda-range-action agenda-range-action--secondary">Cancelar</button>
                            <button type="button" id="date-range-apply" class="agenda-range-action">OK</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="agenda-toolbar__group">
                <label class="agenda-filter agenda-filter--wide">
                    <span>Competição</span>
                    <select id="filter-competition">
                        <option value="">Todas</option>
                    </select>
                </label>
            </div>
        </section>

        <div class="data-status hidden" id="agenda-data-status" aria-live="polite"></div>

        <section id="content-proximos" class="tab-content" role="tabpanel">
            <div class="agenda-summary" id="agenda-summary-proximos"></div>
            <div class="agenda-list" id="agenda-list-proximos"></div>
        </section>

        <section id="content-resultados-globais" class="tab-content hidden" role="tabpanel">
            <div class="agenda-summary" id="agenda-summary-resultados"></div>
            <div class="agenda-list" id="agenda-list-resultados"></div>
        </section>
    </main>

    <script src="main.js"></script>
    <script src="agenda.js"></script>
</body>
</html>
