name: Sync data

on:
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "sync-data-and-pages"
  cancel-in-progress: true

env:
  MAX_FETCH_FAILURES: "0"
  MAX_FETCH_DEGRADED: "2"
  INITIAL_MAX_ATTEMPTS: "1"
  INITIAL_FETCHER_COOLDOWN_SECONDS: "0"
  INITIAL_DEGRADED_FETCHER_COOLDOWN_SECONDS: "5"
  RESULT_PUBLISH_DELAY_MINUTES: "110"
  RESULT_CHASE_SHORT_RETRY_MINUTES: "15"
  RESULT_CHASE_SHORT_WINDOW_MINUTES: "60"
  RESULT_CHASE_MEDIUM_RETRY_MINUTES: "30"
  RESULT_CHASE_MEDIUM_WINDOW_HOURS: "6"
  RESULT_CHASE_LONG_RETRY_HOURS: "2"
  RESULT_CHASE_LONG_WINDOW_HOURS: "48"
  HISTORICAL_LOOKBACK_DAYS: "14"
  RECENT_HISTORICAL_WINDOW_DAYS: "2"
  RECENT_HISTORICAL_RETRY_HOURS: "2"
  HISTORICAL_RETRY_HOURS: "6"
  CALENDAR_WATCH_LOOKAHEAD_DAYS: "14"
  CALENDAR_WATCH_MATCHDAY_HOURS: "24"
  CALENDAR_WATCH_NEAR_DAYS: "7"
  CALENDAR_WATCH_FAR_DAYS: "14"
  CALENDAR_WATCH_MATCHDAY_CADENCE_HOURS: "2"
  CALENDAR_WATCH_CLOSE_CADENCE_HOURS: "6"
  CALENDAR_WATCH_NEAR_CADENCE_HOURS: "12"
  CALENDAR_WATCH_FAR_CADENCE_HOURS: "24"
  TECHNICAL_BACKOFF_MINUTES: "10,20,40"

jobs:
  build_initial:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restaurar memória técnica do scraping
        uses: actions/cache/restore@v4
        with:
          path: |
            cache/fetch_state.json
            cache/sync_metadata
          key: fetch-state-${{ runner.os }}-main-${{ github.run_id }}
          restore-keys: |
            fetch-state-${{ runner.os }}-main-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Instalar dependências (se existir requirements.txt)
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Correr testes unitários
        run: python -m unittest discover -s tests

      - name: Planear fetchers a executar
        run: python plan_fetchers.py

      - name: Correr fetchers selecionados (primeira vaga)
        timeout-minutes: 45
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import run_fetchers

          plan = json.loads(Path("cache/fetch_plan.json").read_text(encoding="utf-8"))
          selected = plan.get("selected_fetchers", [])

          if not selected:
              report = {
                  "generated_at_epoch": 0,
                  "fetchers": [],
                  "success_count": 0,
                  "failure_count": 0,
                  "degraded_count": 0,
                  "changed_count": 0,
                  "skipped_by_plan": True,
                  "plan_mode": plan.get("mode", "idle"),
              }
              run_fetchers.write_report(report)
              print("No fetchers selected by adaptive plan.")
          else:
              report = run_fetchers.run_fetchers_report(
                  selected,
                  max_attempts=int(os.environ.get("INITIAL_MAX_ATTEMPTS", "1")),
                  fetcher_cooldown_seconds=int(os.environ.get("INITIAL_FETCHER_COOLDOWN_SECONDS", "0")),
                  degraded_fetcher_cooldown_seconds=int(os.environ.get("INITIAL_DEGRADED_FETCHER_COOLDOWN_SECONDS", "5")),
              )
              report["plan_mode"] = plan.get("mode", "idle")
              report["retry_waves"] = []
              run_fetchers.summarize_report(report)
              run_fetchers.write_report(report)
          PY

      - name: Gerar calendário agregado
        run: python build_calendar.py

      - name: Gerar estado global das competições
        run: python build_status.py

      - name: Publicar resumo global de estado
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          status = json.loads(Path("data/status.json").read_text(encoding="utf-8"))
          counts = status.get("statusCounts", {})
          lines = [
              "# Estado global das competições",
              "",
              f"- Gerado em: {status.get('generatedAt')}",
              f"- OK: {counts.get('ok', 0)}",
              f"- Partial: {counts.get('partial', 0)}",
              f"- Degraded: {counts.get('degraded', 0)}",
              f"- Missing: {counts.get('missing', 0)}",
              "",
              "| Competição | Estado | Atualizado | Fallbacks | Jogos passados sem score |",
              "| --- | --- | --- | ---: | ---: |",
          ]

          for key, entry in status.get("competitions", {}).items():
              lines.append(
                  f"| {key} | {entry.get('status')} | {entry.get('lastUpdatedAt') or '-'} | "
                  f"{entry.get('fallbackReuseCount', 0)} | {entry.get('pastMatchesWithoutScore', 0)} |"
              )

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("\\n".join(lines) + "\\n")
          PY

      - name: Publicar resumo do plano de fetch
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          plan = json.loads(Path("cache/fetch_plan.json").read_text(encoding="utf-8"))
          lines = [
              "# Plano adaptativo de fetch",
              "",
              f"- Modo: {plan['mode']}",
              f"- Fetchers selecionados: {plan['selected_count']}",
              f"- Tentativas na vaga inicial: {os.environ.get('INITIAL_MAX_ATTEMPTS', '1')}",
              f"- Cooldown normal na vaga inicial (s): {os.environ.get('INITIAL_FETCHER_COOLDOWN_SECONDS', '0')}",
              f"- Cooldown degradado na vaga inicial (s): {os.environ.get('INITIAL_DEGRADED_FETCHER_COOLDOWN_SECONDS', '5')}",
              f"- Delay após jogo (min): {plan['result_publish_delay_minutes']}",
              f"- Retry curto (min): {plan['result_chase_short_retry_minutes']}",
              f"- Janela curta (min): {plan['result_chase_short_window_minutes']}",
              f"- Retry intermédio (min): {plan['result_chase_medium_retry_minutes']}",
              f"- Janela intermédia (h): {plan['result_chase_medium_window_hours']}",
              f"- Retry longo (h): {plan['result_chase_long_retry_hours']}",
              f"- Janela longa (h): {plan['result_chase_long_window_hours']}",
              f"- Janela de recuperação histórica (dias): {plan['historical_lookback_days']}",
              f"- Histórico recente (dias): {plan['recent_historical_window_days']}",
              f"- Retry histórico recente (h): {plan['recent_historical_retry_hours']}",
              f"- Retry histórico (h): {plan['historical_retry_hours']}",
              f"- Janela de vigilância de calendário (dias): {plan['calendar_watch_lookahead_days']}",
              f"- Matchday watch até (h): {plan['calendar_watch_matchday_hours']}",
              f"- Matchday cadence (h): {plan['calendar_watch_matchday_cadence_hours']}",
              f"- Close watch cadence (h): {plan['calendar_watch_close_cadence_hours']}",
              f"- Near watch cadence (h): {plan['calendar_watch_near_cadence_hours']}",
              f"- Far watch cadence (h): {plan['calendar_watch_far_cadence_hours']}",
              f"- Próximo fetch global: {plan.get('next_global_fetch_at') or '-'}",
              "",
              "| Competição | Fetcher | Estado | Deve correr agora | Pendente hoje | Futuros vigiados | Histórico pendente | Próximo fetch recomendado |",
              "| --- | --- | --- | --- | ---: | ---: | ---: | --- |",
          ]

          for item in plan["competitions"]:
              lines.append(
                  "| {competition_key} | {fetcher} | {state} | {should_fetch} | {pending_today_count} | {future_schedule_refresh_count} | {pending_historical_count} | {next_recommended_fetch_at} |".format(
                      competition_key=item["competition_key"],
                      fetcher=item["fetcher"],
                      state=item["state"],
                      should_fetch="sim" if item["should_fetch"] else "nao",
                      pending_today_count=item.get("pending_today_count", 0),
                      future_schedule_refresh_count=item.get("future_schedule_refresh_count", 0),
                      pending_historical_count=item.get("pending_historical_count", 0),
                      next_recommended_fetch_at=item.get("next_recommended_fetch_at") or "-",
                  )
              )

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary_path, "a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY

      - name: Publicar resumo dos fetchers
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path("cache/fetch_report.json").read_text(encoding="utf-8"))
          lines = [
              "# Resumo dos fetchers (vaga inicial)",
              "",
              f"- Sucesso: {report['success_count']}",
              f"- Falhas: {report['failure_count']}",
              f"- Degradados: {report.get('degraded_count', 0)}",
              f"- Origem alterada: {report.get('source_changed_count', 0)}",
              f"- Parse alterado: {report.get('parsed_changed_count', 0)}",
              f"- Publicado alterado: {report.get('published_changed_count', 0)}",
              f"- Inconsistências publicação: {report.get('publish_inconsistency_count', 0)}",
              "",
              "| Fetcher | Estado | Tentativas | Jornadas | Origem | Parse | Publicado | Inconsistência |",
              "| --- | --- | ---: | ---: | --- | --- | --- | --- |",
          ]

          for item in report["fetchers"]:
              lines.append(
                  "| {fetcher} | {status} | {attempts} | {rounds} | {source_changed} | {parsed_changed} | {published_changed} | {publish_inconsistent} |".format(
                      fetcher=item["fetcher"],
                      status="FAIL" if not item["success"] else ("DEGRADED" if item.get("degraded") else "OK"),
                      attempts=len(item["attempts"]),
                      rounds=item["final_snapshot"]["round_count"],
                      source_changed="sim" if item.get("source_changed") else "nao",
                      parsed_changed="sim" if item.get("parsed_changed") else "nao",
                      published_changed="sim" if item.get("published_changed") else "nao",
                      publish_inconsistent="sim" if item.get("publish_inconsistent") else "nao",
                  )
              )

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary_path, "a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY

      - name: Publicar artefactos de diagnóstico do fetch
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-data-diagnostics
          if-no-files-found: warn
          path: |
            cache/fetch_plan.json
            cache/fetch_report.json
            cache/fetch_state.json
            cache/sync_metadata/**
            cache/errors/**

      - name: Persistir memória técnica do scraping
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            cache/fetch_state.json
            cache/sync_metadata
          key: fetch-state-${{ runner.os }}-main-${{ github.run_id }}

      - name: Atualizar manifesto de emblemas (opcional)
        run: |
          if [ -f generate_crest_manifest.py ]; then
            python generate_crest_manifest.py
          fi

      - name: Validar inconsistências de publicação
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("cache/fetch_report.json").read_text(encoding="utf-8"))
          inconsistencies = [
              item["fetcher"]
              for item in report.get("fetchers", [])
              if item.get("publish_inconsistent")
          ]
          if inconsistencies:
              raise SystemExit(
                  "Publish inconsistency detected for fetchers: " + ", ".join(inconsistencies)
              )
          PY

      - name: Commit de dados atualizados (se houver alterações)
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "chore(data): refresh JSON [skip ci]"
            git push
          else
            echo "Sem alterações nos JSON."
          fi

      - name: Validar política de robustez dos fetchers
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path("cache/fetch_report.json").read_text(encoding="utf-8"))
          max_failures = int(os.environ.get("MAX_FETCH_FAILURES", "0"))
          max_degraded = int(os.environ.get("MAX_FETCH_DEGRADED", "0"))

          failure_count = report.get("failure_count", 0)
          degraded_count = report.get("degraded_count", 0)

          print(f"Policy: MAX_FETCH_FAILURES={max_failures} MAX_FETCH_DEGRADED={max_degraded}")
          print(f"Observed: failure_count={failure_count} degraded_count={degraded_count}")

          if failure_count > max_failures:
              raise SystemExit(
                  f"Fetch policy failed: {failure_count} failures exceed allowed {max_failures}."
              )

          if degraded_count > max_degraded:
              raise SystemExit(
                  f"Fetch policy failed: {degraded_count} degraded fetchers exceed allowed {max_degraded}."
              )
          PY

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Upload artefacto inicial do site
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-initial
          path: "."

  deploy_initial:
    needs: build_initial
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy inicial a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-initial

      - name: Mostrar mensagem final
        run: |
          echo ""
          echo "=============================================="
          echo "✅ Site atualizado com sucesso (vaga inicial)!"
          echo "🌍 URL: https://majoroka.github.io/scores_CFA/"
          echo "=============================================="
