name: Sync data

on:
  push:
    branches:
      - main
    paths:
      - "fetch_*.py"
      - "fpf_http.py"
      - "run_fetchers.py"
      - "plan_fetchers.py"
      - "build_calendar.py"
      - "build_status.py"
      - "requirements.txt"
      - "competition_configs.py"
      - "competition_sync.py"
      - ".github/workflows/update-data.yml"
      - ".github/workflows/retry-pending-results.yml"
  workflow_dispatch: {}
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "sync-data-and-pages"
  cancel-in-progress: true

env:
  MAX_FETCH_FAILURES: "0"
  MAX_FETCH_DEGRADED: "2"
  PREMATCH_WINDOW_HOURS: "3"
  ACTIVE_RESULT_WINDOW_DAYS: "2"
  HISTORICAL_LOOKBACK_DAYS: "14"
  ACTIVE_RETRY_DELAYS_MINUTES: "5,10,20,40"

jobs:
  build_initial:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Instalar dependências (se existir requirements.txt)
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Correr testes unitários
        run: python -m unittest discover -s tests

      - name: Planear fetchers a executar
        run: python plan_fetchers.py

      - name: Correr fetchers selecionados (primeira vaga)
        timeout-minutes: 45
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import run_fetchers

          plan = json.loads(Path("cache/fetch_plan.json").read_text(encoding="utf-8"))
          selected = plan.get("selected_fetchers", [])

          if not selected:
              report = {
                  "generated_at_epoch": 0,
                  "fetchers": [],
                  "success_count": 0,
                  "failure_count": 0,
                  "degraded_count": 0,
                  "changed_count": 0,
                  "skipped_by_plan": True,
                  "plan_mode": plan.get("mode", "idle"),
              }
              run_fetchers.write_report(report)
              print("No fetchers selected by adaptive plan.")
          else:
              report = run_fetchers.run_fetchers_report(selected)
              report["plan_mode"] = plan.get("mode", "idle")
              report["retry_waves"] = []
              run_fetchers.summarize_report(report)
              run_fetchers.write_report(report)
          PY

      - name: Gerar calendário agregado
        run: python build_calendar.py

      - name: Gerar estado global das competições
        run: python build_status.py

      - name: Publicar resumo global de estado
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          status = json.loads(Path("data/status.json").read_text(encoding="utf-8"))
          counts = status.get("statusCounts", {})
          lines = [
              "# Estado global das competições",
              "",
              f"- Gerado em: {status.get('generatedAt')}",
              f"- OK: {counts.get('ok', 0)}",
              f"- Partial: {counts.get('partial', 0)}",
              f"- Degraded: {counts.get('degraded', 0)}",
              f"- Missing: {counts.get('missing', 0)}",
              "",
              "| Competição | Estado | Atualizado | Fallbacks | Jogos passados sem score |",
              "| --- | --- | --- | ---: | ---: |",
          ]

          for key, entry in status.get("competitions", {}).items():
              lines.append(
                  f"| {key} | {entry.get('status')} | {entry.get('lastUpdatedAt') or '-'} | "
                  f"{entry.get('fallbackReuseCount', 0)} | {entry.get('pastMatchesWithoutScore', 0)} |"
              )

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("\\n".join(lines) + "\\n")
          PY

      - name: Publicar resumo do plano de fetch
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          plan = json.loads(Path("cache/fetch_plan.json").read_text(encoding="utf-8"))
          lines = [
              "# Plano adaptativo de fetch",
              "",
              f"- Modo: {plan['mode']}",
              f"- Fetchers selecionados: {plan['selected_count']}",
              f"- Janela pré-jogo (h): {plan['prematch_window_hours']}",
              f"- Janela ativa de resultados (dias): {plan['active_result_window_days']}",
              f"- Janela de recuperação histórica (dias): {plan['historical_lookback_days']}",
              "",
              "| Competição | Fetcher | Estado | Ativo pendente | Hoje fora da janela | Histórico pendente |",
              "| --- | --- | --- | ---: | ---: | ---: |",
          ]

          for item in plan["competitions"]:
              lines.append(
                  "| {competition_key} | {fetcher} | {state} | {active_pending_count} | {upcoming_today_count} | {historical_pending_count} |".format(**item)
              )

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary_path, "a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY

      - name: Publicar resumo dos fetchers
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path("cache/fetch_report.json").read_text(encoding="utf-8"))
          lines = [
              "# Resumo dos fetchers (vaga inicial)",
              "",
              f"- Sucesso: {report['success_count']}",
              f"- Falhas: {report['failure_count']}",
              f"- Degradados: {report.get('degraded_count', 0)}",
              f"- Alterados: {report['changed_count']}",
              "",
              "| Fetcher | Estado | Tentativas | Jornadas | Alterou JSON |",
              "| --- | --- | ---: | ---: | --- |",
          ]

          for item in report["fetchers"]:
              lines.append(
                  "| {fetcher} | {status} | {attempts} | {rounds} | {changed} |".format(
                      fetcher=item["fetcher"],
                      status="FAIL" if not item["success"] else ("DEGRADED" if item.get("degraded") else "OK"),
                      attempts=len(item["attempts"]),
                      rounds=item["final_snapshot"]["round_count"],
                      changed="sim" if item["changed"] else "nao",
                  )
              )

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary_path, "a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY

      - name: Atualizar manifesto de emblemas (opcional)
        run: |
          if [ -f generate_crest_manifest.py ]; then
            python generate_crest_manifest.py
          fi

      - name: Commit de dados atualizados (se houver alterações)
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "chore(data): refresh JSON [skip ci]"
            git push
          else
            echo "Sem alterações nos JSON."
          fi

      - name: Validar política de robustez dos fetchers
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path("cache/fetch_report.json").read_text(encoding="utf-8"))
          max_failures = int(os.environ.get("MAX_FETCH_FAILURES", "0"))
          max_degraded = int(os.environ.get("MAX_FETCH_DEGRADED", "0"))

          failure_count = report.get("failure_count", 0)
          degraded_count = report.get("degraded_count", 0)

          print(f"Policy: MAX_FETCH_FAILURES={max_failures} MAX_FETCH_DEGRADED={max_degraded}")
          print(f"Observed: failure_count={failure_count} degraded_count={degraded_count}")

          if failure_count > max_failures:
              raise SystemExit(
                  f"Fetch policy failed: {failure_count} failures exceed allowed {max_failures}."
              )

          if degraded_count > max_degraded:
              raise SystemExit(
                  f"Fetch policy failed: {degraded_count} degraded fetchers exceed allowed {max_degraded}."
              )
          PY

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Upload artefacto inicial do site
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-initial
          path: "."

  deploy_initial:
    needs: build_initial
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy inicial a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-initial

      - name: Mostrar mensagem final
        run: |
          echo ""
          echo "=============================================="
          echo "✅ Site atualizado com sucesso (vaga inicial)!"
          echo "🌍 URL: https://majoroka.github.io/scores_CFA/"
          echo "=============================================="
