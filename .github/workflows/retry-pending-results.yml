name: Retry pending results and deploy

on:
  workflow_dispatch: {}
  workflow_run:
    workflows:
      - Sync data
    types:
      - completed

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "retry-pending-results"
  cancel-in-progress: true

env:
  RESULT_PUBLISH_DELAY_MINUTES: "110"
  RESULT_CHASE_SHORT_RETRY_MINUTES: "15"
  RESULT_CHASE_SHORT_WINDOW_MINUTES: "60"
  RESULT_CHASE_MEDIUM_RETRY_MINUTES: "30"
  RESULT_CHASE_MEDIUM_WINDOW_HOURS: "6"
  RESULT_CHASE_LONG_RETRY_HOURS: "2"
  RESULT_CHASE_LONG_WINDOW_HOURS: "48"
  HISTORICAL_LOOKBACK_DAYS: "14"
  RECENT_HISTORICAL_WINDOW_DAYS: "2"
  RECENT_HISTORICAL_RETRY_HOURS: "2"
  HISTORICAL_RETRY_HOURS: "6"
  CALENDAR_WATCH_LOOKAHEAD_DAYS: "14"
  CALENDAR_WATCH_MATCHDAY_HOURS: "24"
  CALENDAR_WATCH_NEAR_DAYS: "7"
  CALENDAR_WATCH_FAR_DAYS: "14"
  CALENDAR_WATCH_MATCHDAY_CADENCE_HOURS: "2"
  CALENDAR_WATCH_CLOSE_CADENCE_HOURS: "6"
  CALENDAR_WATCH_NEAR_CADENCE_HOURS: "12"
  CALENDAR_WATCH_FAR_CADENCE_HOURS: "24"
  TECHNICAL_BACKOFF_MINUTES: "10,20,40"
  FOLLOWUP_MAX_MINUTES: "180"
  FOLLOWUP_MAX_ATTEMPTS: "1"
  FOLLOWUP_FETCHER_COOLDOWN_SECONDS: "0"
  FOLLOWUP_DEGRADED_FETCHER_COOLDOWN_SECONDS: "5"
  FOLLOWUP_MAX_NO_PROGRESS_WAVES: "2"

jobs:
  retry_followup:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.actor.login != 'github-actions[bot]'
      )
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.retry_commit.outputs.changed }}
      pending_selected_count: ${{ steps.plan_meta.outputs.pending_selected_count }}
      plan_mode: ${{ steps.plan_meta.outputs.plan_mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Restaurar memória técnica do scraping
        uses: actions/cache/restore@v4
        with:
          path: |
            cache/fetch_state.json
            cache/sync_metadata
          key: fetch-state-${{ runner.os }}-main-${{ github.run_id }}
          restore-keys: |
            fetch-state-${{ runner.os }}-main-

      - name: Sincronizar com o último main publicado
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Instalar dependências (se existir requirements.txt)
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Planear fetchers a executar
        run: python plan_fetchers.py

      - name: Exportar metadados do plano
        id: plan_meta
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          plan = json.loads(Path("cache/fetch_plan.json").read_text(encoding="utf-8"))
          retry_selected = [
              item["fetcher"]
              for item in plan.get("competitions", [])
              if item.get("state") in {"calendar_watch_matchday", "calendar_watch_near", "calendar_watch_far", "result_chase", "recent_historical_backfill", "historical_backfill", "missing_payload"}
          ]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"plan_mode={plan.get('mode', 'idle')}\n")
              handle.write(f"pending_selected_count={len(retry_selected)}\n")
          PY

      - name: Publicar resumo do plano de follow-up
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          plan = json.loads(Path("cache/fetch_plan.json").read_text(encoding="utf-8"))
          lines = [
              "# Plano adaptativo de fetch (follow-up)",
              "",
              f"- Modo: {plan['mode']}",
              f"- Fetchers selecionados: {plan['selected_count']}",
              f"- Delay após jogo (min): {plan['result_publish_delay_minutes']}",
              f"- Retry curto (min): {plan['result_chase_short_retry_minutes']}",
              f"- Janela curta (min): {plan['result_chase_short_window_minutes']}",
              f"- Retry intermédio (min): {plan['result_chase_medium_retry_minutes']}",
              f"- Janela intermédia (h): {plan['result_chase_medium_window_hours']}",
              f"- Retry longo (h): {plan['result_chase_long_retry_hours']}",
              f"- Janela longa (h): {plan['result_chase_long_window_hours']}",
              f"- Histórico recente (dias): {plan['recent_historical_window_days']}",
              f"- Retry histórico recente (h): {plan['recent_historical_retry_hours']}",
              f"- Retry histórico (h): {plan['historical_retry_hours']}",
              f"- Janela de vigilância de calendário (dias): {plan['calendar_watch_lookahead_days']}",
              f"- Matchday watch até (h): {plan['calendar_watch_matchday_hours']}",
              f"- Matchday cadence (h): {plan['calendar_watch_matchday_cadence_hours']}",
              f"- Close watch cadence (h): {plan['calendar_watch_close_cadence_hours']}",
              f"- Near watch cadence (h): {plan['calendar_watch_near_cadence_hours']}",
              f"- Far watch cadence (h): {plan['calendar_watch_far_cadence_hours']}",
              f"- Próximo fetch global: {plan.get('next_global_fetch_at') or '-'}",
              "",
              "| Competição | Fetcher | Estado | Deve correr agora | Pendente hoje | Futuros vigiados | Histórico pendente | Próximo fetch recomendado |",
              "| --- | --- | --- | --- | ---: | ---: | ---: | --- |",
          ]

          for item in plan["competitions"]:
              lines.append(
                  "| {competition_key} | {fetcher} | {state} | {should_fetch} | {pending_today_count} | {future_schedule_refresh_count} | {pending_historical_count} | {next_recommended_fetch_at} |".format(
                      competition_key=item["competition_key"],
                      fetcher=item["fetcher"],
                      state=item["state"],
                      should_fetch="sim" if item["should_fetch"] else "nao",
                      pending_today_count=item.get("pending_today_count", 0),
                      future_schedule_refresh_count=item.get("future_schedule_refresh_count", 0),
                      pending_historical_count=item.get("pending_historical_count", 0),
                      next_recommended_fetch_at=item.get("next_recommended_fetch_at") or "-",
                  )
              )

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY

      - name: Repetir fetchers pendentes conforme janela recomendada
        if: steps.plan_meta.outputs.pending_selected_count != '0'
        timeout-minutes: 180
        run: |
          python - <<'PY'
          import json
          import os
          import time
          from datetime import datetime
          from pathlib import Path
          import plan_fetchers
          import run_fetchers

          followup_max_minutes = int(os.environ.get("FOLLOWUP_MAX_MINUTES", "180"))
          followup_max_attempts = int(os.environ.get("FOLLOWUP_MAX_ATTEMPTS", "1"))
          followup_fetcher_cooldown_seconds = int(os.environ.get("FOLLOWUP_FETCHER_COOLDOWN_SECONDS", "0"))
          followup_degraded_fetcher_cooldown_seconds = int(os.environ.get("FOLLOWUP_DEGRADED_FETCHER_COOLDOWN_SECONDS", "5"))
          followup_max_no_progress_waves = int(os.environ.get("FOLLOWUP_MAX_NO_PROGRESS_WAVES", "2"))
          deadline_epoch = time.time() + (followup_max_minutes * 60)
          consecutive_no_progress_waves = 0

          def retryable_competitions(current_plan):
              return [
                  item
                  for item in current_plan.get("competitions", [])
                  if item.get("state") in {"calendar_watch_matchday", "calendar_watch_near", "calendar_watch_far", "result_chase", "recent_historical_backfill", "historical_backfill", "missing_payload"}
              ]

          def retryable_fetchers(current_plan):
              return sorted({
                  item["fetcher"]
                  for item in retryable_competitions(current_plan)
              })

          def due_fetchers(current_plan):
              return sorted({
                  item["fetcher"]
                  for item in retryable_competitions(current_plan)
                  if item.get("should_fetch")
              })

          def parse_iso(value):
              if not value:
                  return None
              try:
                  return datetime.fromisoformat(value)
              except ValueError:
                  return None

          def next_due_timestamp(current_plan):
              candidates = []
              for item in retryable_competitions(current_plan):
                  parsed = parse_iso(item.get("next_recommended_fetch_at"))
                  if parsed is not None:
                      candidates.append(parsed.timestamp())
              return min(candidates) if candidates else None

          report = {
              "generated_at_epoch": 0,
              "fetchers": [],
              "success_count": 0,
              "failure_count": 0,
              "degraded_count": 0,
              "changed_count": 0,
              "retry_waves": [],
              "plan_mode": "active_pending",
              "followup_only": True,
          }

          while True:
              current_plan = plan_fetchers.build_plan()
              plan_fetchers.write_plan(current_plan)
              candidates = retryable_fetchers(current_plan)
              if not candidates:
                  break

              due_now = due_fetchers(current_plan)
              if due_now:
                  print(f"Running due fetchers: {', '.join(due_now)}")
                  retry_report = run_fetchers.run_fetchers_report(
                      due_now,
                      max_attempts=followup_max_attempts,
                      fetcher_cooldown_seconds=followup_fetcher_cooldown_seconds,
                      degraded_fetcher_cooldown_seconds=followup_degraded_fetcher_cooldown_seconds,
                  )
                  retry_report["scheduled_at_epoch"] = int(time.time())
                  report["retry_waves"].append(retry_report)

                  latest_by_fetcher = {item["fetcher"]: item for item in report["fetchers"]}
                  for item in retry_report["fetchers"]:
                      latest_by_fetcher[item["fetcher"]] = item
                  report["fetchers"] = list(latest_by_fetcher.values())
                  run_fetchers.summarize_report(report)

                  wave_had_progress = retry_report.get("changed_count", 0) > 0
                  if wave_had_progress:
                      consecutive_no_progress_waves = 0
                  else:
                      consecutive_no_progress_waves += 1
                      print(
                          "No progress in follow-up wave "
                          f"({consecutive_no_progress_waves}/{followup_max_no_progress_waves})"
                      )
                      if consecutive_no_progress_waves >= followup_max_no_progress_waves:
                          print("Ending follow-up early after repeated no-progress waves.")
                          break
                  continue

              next_due = next_due_timestamp(current_plan)
              if next_due is None:
                  break

              sleep_seconds = max(0, int(next_due - time.time()))
              if sleep_seconds <= 0:
                  continue
              if time.time() + sleep_seconds > deadline_epoch:
                  print("Follow-up window ended before next recommended fetch.")
                  break

              print(f"Waiting {sleep_seconds}s until next recommended fetch window")
              time.sleep(sleep_seconds)

          current_plan = plan_fetchers.build_plan()
          plan_fetchers.write_plan(current_plan)
          report["plan_mode"] = current_plan.get("mode", "idle")
          run_fetchers.summarize_report(report)
          run_fetchers.write_report(report)
          PY

      - name: Escrever relatório vazio quando não há follow-up ativo
        if: steps.plan_meta.outputs.pending_selected_count == '0'
        run: |
          python - <<'PY'
          import run_fetchers

          report = {
              "generated_at_epoch": 0,
              "fetchers": [],
              "success_count": 0,
              "failure_count": 0,
              "degraded_count": 0,
              "changed_count": 0,
              "retry_waves": [],
              "plan_mode": "idle",
              "followup_only": True,
              "skipped_by_plan": True,
          }
          run_fetchers.write_report(report)
          PY

      - name: Gerar calendário agregado
        run: python build_calendar.py

      - name: Gerar estado global das competições
        run: python build_status.py

      - name: Publicar resumo global de estado
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          status = json.loads(Path("data/status.json").read_text(encoding="utf-8"))
          counts = status.get("statusCounts", {})
          lines = [
              "# Estado global das competições (follow-up)",
              "",
              f"- Gerado em: {status.get('generatedAt')}",
              f"- OK: {counts.get('ok', 0)}",
              f"- Partial: {counts.get('partial', 0)}",
              f"- Degraded: {counts.get('degraded', 0)}",
              f"- Missing: {counts.get('missing', 0)}",
          ]
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("\\n".join(lines) + "\\n")
          PY

      - name: Publicar resumo dos fetchers (follow-up)
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path("cache/fetch_report.json").read_text(encoding="utf-8"))
          lines = [
              "# Resumo dos fetchers (follow-up)",
              "",
              f"- Sucesso: {report['success_count']}",
              f"- Falhas: {report['failure_count']}",
              f"- Degradados: {report.get('degraded_count', 0)}",
              f"- Origem alterada: {report.get('source_changed_count', 0)}",
              f"- Parse alterado: {report.get('parsed_changed_count', 0)}",
              f"- Publicado alterado: {report.get('published_changed_count', 0)}",
              f"- Inconsistências publicação: {report.get('publish_inconsistency_count', 0)}",
              f"- Vagas executadas: {len(report.get('retry_waves', []))}",
          ]
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY

      - name: Publicar artefactos de diagnóstico do follow-up
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retry-followup-diagnostics
          if-no-files-found: warn
          path: |
            cache/fetch_plan.json
            cache/fetch_report.json
            cache/fetch_state.json
            cache/sync_metadata/**
            cache/errors/**

      - name: Persistir memória técnica do scraping
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            cache/fetch_state.json
            cache/sync_metadata
          key: fetch-state-${{ runner.os }}-main-${{ github.run_id }}

      - name: Atualizar manifesto de emblemas (opcional)
        run: |
          if [ -f generate_crest_manifest.py ]; then
            python generate_crest_manifest.py
          fi

      - name: Validar inconsistências de publicação
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("cache/fetch_report.json").read_text(encoding="utf-8"))
          inconsistencies = [
              item["fetcher"]
              for item in report.get("fetchers", [])
              if item.get("publish_inconsistent")
          ]
          if inconsistencies:
              raise SystemExit(
                  "Publish inconsistency detected for fetchers: " + ", ".join(inconsistencies)
              )
          PY

      - name: Commit de dados atualizados após retries
        id: retry_commit
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "chore(data): refresh JSON after retries [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Sem alterações nos JSON após retries."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configurar Pages
        if: steps.retry_commit.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artefacto follow-up do site
        if: steps.retry_commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-followup
          path: "."

  deploy_followup:
    needs: retry_followup
    if: needs.retry_followup.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy follow-up a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-followup
