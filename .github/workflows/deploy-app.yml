name: Deploy app

on:
  push:
    branches:
      - main
    paths:
      - "*.html"
      - "*.js"
      - "css/**"
      - "img/**"
      - ".github/workflows/deploy-app.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deploy-app-pages"
  cancel-in-progress: true

jobs:
  deploy_app:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Upload artefacto da app
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy app a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
